name: dopablocker_mobile
description: "DopaBlocker — bloqueador de distrações para Android e iOS."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2

  # HTTP
  dio: ^5.7.0

  # Estado
  flutter_riverpod: ^2.6.1

  # Armazenamento seguro (device token — equivalente ao Windows Credential Manager)
  flutter_secure_storage: ^9.2.4

  # Banco local criptografado (fase 2 — cache offline da blocklist)
  sqflite_sqlcipher: ^3.1.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
